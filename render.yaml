services:
  - type: web
    name: singhji-api
    runtime: python
    plan: free
    region: singapore

    buildCommand: |
      echo "🦁 Singh Ji AI Ultra v7.0 Build..."
      pip install --upgrade pip
      pip install -r requirements.txt
      echo "✅ Build complete!"

    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT --workers 1

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

    healthCheckPath: /health
    autoDeploy: true
