# Render.yaml — Singh Ji AI Ultra v5.0 (FIXED)
# Full deployment configuration with all dependencies

services:
  - type: web
    name: singhji-api
    runtime: python
    plan: free
    region: singapore

    buildCommand: |
      echo "🦁 Installing Singh Ji AI dependencies..."
      pip install --upgrade pip
      pip install -r requirements.txt
      echo "✅ All dependencies installed!"

    startCommand: |
      echo "🚀 Starting Singh Ji AI Ultra v5.0..."
      echo "👑 Singh Ji ka Raj Shuru!"
      uvicorn core.app:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

      - key: PORT
        value: 10000

      # API Keys — Set in Render Dashboard
      - key: NEWSDATA_API_KEY
        sync: false

      - key: CURRENTS_API_KEY
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      - key: GROQ_API_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      - key: WEATHER_API_KEY
        sync: false

      - key: PLANT_ID_API_KEY
        sync: false

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_KEY
        sync: false

      - key: SUPABASE_SERVICE_KEY
        sync: false

      - key: TELEGRAM_BOT_TOKEN
        sync: false

      - key: SMTP_SERVER
        sync: false

      - key: SMTP_PORT
        sync: false

      - key: SMTP_USER
        sync: false

      - key: SMTP_PASSWORD
        sync: false

      - key: UPI_ID
        value: jp200883@sbi

      - key: MERCHANT_NAME
        value: Singh Ji AI

      - key: ADMIN_KEY
        value: singhji-admin-2026

    healthCheckPath: /health

    autoDeploy: true

    disk:
      name: singhji-data
      mountPath: /data
      sizeGB: 1
