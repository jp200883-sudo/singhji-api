services:
  - type: web
    name: singhji-agent-swarm
    runtime: docker
    plan: standard
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: UVICORN_WORKERS
        value: 4
      - key: MAX_AGENTS
        value: 300
      - key: MAX_STEPS
        value: 4000
      - key: CLAW_GROUPS
        value: 11
      - key: REDIS_URL
        fromService:
          name: singhji-redis
          type: redis
          property: connectionString
    healthCheckPath: /health
    autoDeploy: true

  - type: redis
    name: singhji-redis
    plan: free
    ipAllowList: []
