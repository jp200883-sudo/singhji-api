services:
  - type: web
    name: singhji-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn core.app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: PORT
        value: 10000
      - key: FLASK_ENV
        value: production
      - key: RENDER_LOAD_MODE
        value: lazy
      - key: PYTHONPATH
        value: "/opt/render/project/src"
    healthCheckPath: /health
    autoDeploy: true
    branch: master