<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦁 Singh Ji AI Ultra</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
    }
    .header {
      background: rgba(233, 69, 96, 0.9);
      padding: 15px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 24px; }
    .header p { font-size: 12px; opacity: 0.9; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .card:hover {
      background: rgba(233, 69, 96, 0.2);
      transform: translateY(-5px);
    }
    .card .icon { font-size: 32px; margin-bottom: 8px; }
    .card .label { font-size: 12px; font-weight: 600; }
    .voice-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #e94560;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .sos-btn {
      position: fixed;
      bottom: 30px;
      left: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #ff0000;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .status-bar {
      background: rgba(0,0,0,0.3);
      padding: 10px;
      text-align: center;
      font-size: 12px;
      color: #a0a0a0;
    }
    /* ===== PAYMENT SECTION ===== */
    #payment-section {
      display: none;
      padding: 20px;
      text-align: center;
      max-width: 500px;
      margin: 0 auto;
    }
    #payment-section h2 { color: #ffd700; margin-bottom: 10px; }
    #payment-section p { color: #a0a0a0; margin-bottom: 15px; }
    .plans {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 15px 0;
    }
    .plans button {
      padding: 12px 20px;
      border-radius: 10px;
      background: #e94560;
      color: #fff;
      border: none;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    .plans button:hover {
      background: #ff6b6b;
      transform: scale(1.05);
    }
    .payment-box {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      margin-top: 15px;
    }
    .btn-pay {
      display: inline-block;
      padding: 12px 24px;
      background: #00c853;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      margin: 10px;
      font-weight: bold;
    }
    .btn-copy {
      padding: 12px 24px;
      background: #2196f3;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
<base target="_blank">
</head>
<body>
  <!-- ===== HEADER ===== -->
  <div class="header">
    <h1>🦁 Singh Ji AI Ultra</h1>
    <p>56 Features — 100% FREE — Made in India 🇮🇳</p>
  </div>

  <!-- ===== STATUS BAR ===== -->
  <div class="status-bar" id="status-text">🟢 Online | Ready</div>

  <!-- ===== GRID CARDS ===== -->
  <div class="grid">
    <div class="card" onclick="openModule('emergency')">
      <div class="icon">🚨</div>
      <div class="label">Emergency</div>
    </div>
    <div class="card" onclick="openModule('govt')">
      <div class="icon">🏛️</div>
      <div class="label">Govt Schemes</div>
    </div>
    <div class="card" onclick="openModule('voice')">
      <div class="icon">🎙️</div>
      <div class="label">JP Voice</div>
    </div>
    <div class="card" onclick="openModule('food')">
      <div class="icon">🍲</div>
      <div class="label">Food</div>
    </div>
    <div class="card" onclick="openModule('taxi')">
      <div class="icon">🚕</div>
      <div class="label">Taxi</div>
    </div>
    <div class="card" onclick="openModule('music')">
      <div class="icon">🎵</div>
      <div class="label">Music</div>
    </div>
    <div class="card" onclick="openModule('map')">
      <div class="icon">🗺️</div>
      <div class="label">Maps</div>
    </div>
    <div class="card" onclick="openModule('games')">
      <div class="icon">🎮</div>
      <div class="label">Games</div>
    </div>
    <div class="card" onclick="openModule('education')">
      <div class="icon">📚</div>
      <div class="label">Education</div>
    </div>
    <div class="card" onclick="openModule('safety')">
      <div class="icon">🛡️</div>
      <div class="label">Safety</div>
    </div>
    <div class="card" onclick="openModule('banking')">
      <div class="icon">🏦</div>
      <div class="label">Banking</div>
    </div>
    <div class="card" onclick="showPayment()">
      <div class="icon">💰</div>
      <div class="label">Premium</div>
    </div>
  </div>

  <!-- ===== PAYMENT SECTION (Hidden by default) ===== -->
  <div id="payment-section">
    <h2>💰 Singh Ji AI Premium</h2>
    <p>UPI ID: <b>jp200883@sbi</b></p>

    <div class="plans">
      <button onclick="initPayment(99, 'Basic')">₹99 - Basic</button>
      <button onclick="initPayment(299, 'Pro')">₹299 - Pro</button>
      <button onclick="initPayment(999, 'Ultra')">₹999 - Ultra</button>
    </div>

    <div id="payment-container"></div>
    <br>
    <button onclick="hidePayment()" style="padding:8px 16px; background:#555; color:#fff; border:none; border-radius:8px;">❌ Close</button>
  </div>

  <!-- ===== FLOATING BUTTONS ===== -->
  <button class="sos-btn" onclick="triggerSOS()">SOS</button>
  <button class="voice-btn" onclick="toggleVoice()">🎙️</button>

  <!-- ===== SCRIPTS ===== -->
  <script src="script.js"></script>
  <script>
    // ===== MODULE FUNCTIONS =====
    function openModule(module) {
      alert('🦁 ' + module + ' module loading...');
    }

    function triggerSOS() {
      if(confirm('🚨 EMERGENCY SOS triggered! Call help?')) {
        alert('Calling emergency contacts...');
      }
    }

    function toggleVoice() {
      alert('🎙️ Voice mode activated! Boliye...');
    }

    // ===== PAYMENT FUNCTIONS =====
    function showPayment() {
      document.getElementById('payment-section').style.display = 'block';
      document.getElementById('payment-section').scrollIntoView({behavior: 'smooth'});
    }

    function hidePayment() {
      document.getElementById('payment-section').style.display = 'none';
    }

    async function initPayment(amount, plan) {
      const upiId = "jp200883@sbi";
      const upiUrl = `upi://pay?pa=${upiId}&pn=SinghJiAI&am=${amount}&cu=INR&tn=${plan}`;

      document.getElementById('payment-container').innerHTML = `
        <div class="payment-box">
          <h3>₹${amount} - ${plan} Plan</h3>
          <a href="${upiUrl}" class="btn-pay">📱 Pay via UPI App</a>
          <button class="btn-copy" onclick="navigator.clipboard.writeText('${upiId}');alert('UPI ID copied: ${upiId}')">📋 Copy UPI ID</button>
          <p style="margin-top:10px; font-size:12px; color:#aaa;">After payment, screenshot bhejo!</p>
        </div>
      `;

      // Backend notify
      try {
        await fetch('https://singhji-api.onrender.com/api/admin/payment/init', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({amount, plan, upi_id: upiId})
        });
      } catch(e) {
        console.log('Backend sync failed, payment still works');
      }
    }
  </script>
</body>
</html>
