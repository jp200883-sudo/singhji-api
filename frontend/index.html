<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦁 Singh Ji AI Ultra</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
    }
    .header {
      background: rgba(233, 69, 96, 0.9);
      padding: 15px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 24px; }
    .header p { font-size: 12px; opacity: 0.9; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .card:hover {
      background: rgba(233, 69, 96, 0.2);
      transform: translateY(-5px);
    }
    .card .icon { font-size: 32px; margin-bottom: 8px; }
    .card .label { font-size: 12px; font-weight: 600; }
    .voice-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #e94560;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .sos-btn {
      position: fixed;
      bottom: 30px;
      left: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #ff0000;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .status-bar {
      background: rgba(0,0,0,0.3);
      padding: 10px;
      text-align: center;
      font-size: 12px;
      color: #a0a0a0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦁 Singh Ji AI Ultra</h1>
    <p>56 Features — 100% FREE — Made in India 🇮🇳</p>
  </div>

  <div class="status-bar" id="status-text">🟢 Online | Ready</div>

  <div class="grid">
    <div class="card" onclick="openModule('emergency')">
      <div class="icon">🚨</div>
      <div class="label">Emergency</div>
    </div>
    <div class="card" onclick="openModule('govt')">
      <div class="icon">🏛️</div>
      <div class="label">Govt Schemes</div>
    </div>
    <div class="card" onclick="openModule('voice')">
      <div class="icon">🎙️</div>
      <div class="label">JP Singh Voice</div>
    </div>
    <div class="card" onclick="openModule('food')">
      <div class="icon">🍲</div>
      <div class="label">Khana</div>
    </div>
    <div class="card" onclick="openModule('taxi')">
      <div class="icon">🚕</div>
      <div class="label">Taxi</div>
    </div>
    <div class="card" onclick="openModule('music')">
      <div class="icon">🎵</div>
      <div class="label">Gaana</div>
    </div>
    <div class="card" onclick="openModule('map')">
      <div class="icon">🗺️</div>
      <div class="label">Maps</div>
    </div>
    <div class="card" onclick="openModule('games')">
      <div class="icon">🎮</div>
      <div class="label">Games</div>
    </div>
    <div class="card" onclick="openModule('education')">
      <div class="icon">📚</div>
      <div class="label">Padho</div>
    </div>
    <div class="card" onclick="openModule('safety')">
      <div class="icon">🛡️</div>
      <div class="label">Bacho ki Suraksha</div>
    </div>
    <div class="card" onclick="openModule('banking')">
      <div class="icon">🏦</div>
      <div class="label">Banking</div>
    </div>
    <div class="card" onclick="openModule('news')">
      <div class="icon">📰</div>
      <div class="label">Khabar</div>
    </div>
  </div>

  <button class="sos-btn" onclick="triggerSOS()">SOS</button>
  <button class="voice-btn" onclick="toggleVoice()">🎙️</button>

  <script src="script.js"></script>
  <script>
    function openModule(module) {
      alert('🦁 ' + module + ' module loading...');
      // window.location.href = '/' + module;
    }
    function triggerSOS() {
      if(confirm('🚨 EMERGENCY SOS triggered! Call help?')) {
        alert('Calling emergency contacts...');
      }
    }
    function toggleVoice() {
      alert('🎙️ Voice mode activated! Boliye...');
    }
  </script>
</body>
</html>
