<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦁 Singh Ji AI — Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; }
    .sidebar { width: 250px; background: #16213e; height: 100vh; position: fixed; padding: 20px; }
    .sidebar h2 { color: #e94560; margin-bottom: 30px; }
    .nav-item { padding: 12px; margin: 5px 0; border-radius: 8px; cursor: pointer; }
    .nav-item:hover { background: rgba(233, 69, 96, 0.2); }
    .main { margin-left: 250px; padding: 30px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; text-align: center; }
    .stat-card .number { font-size: 36px; color: #e94560; font-weight: bold; }
    .stat-card .label { color: #a0a0a0; margin-top: 5px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
    th { color: #e94560; }
    .status-active { color: #00ff88; }
    .status-pending { color: #ffaa00; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>🦁 Singh Ji AI</h2>
    <div class="nav-item">📊 Dashboard</div>
    <div class="nav-item">👥 Users</div>
    <div class="nav-item">💰 Payments</div>
    <div class="nav-item">🧩 Modules</div>
    <div class="nav-item">⚙️ Settings</div>
  </div>
  <div class="main">
    <h1>📊 Dashboard</h1>
    <div class="stats">
      <div class="stat-card">
        <div class="number">50K+</div>
        <div class="label">Users</div>
      </div>
      <div class="stat-card">
        <div class="number">₹2.5L</div>
        <div class="label">Revenue</div>
      </div>
      <div class="stat-card">
        <div class="number">1.2K</div>
        <div class="label">Paid Users</div>
      </div>
    </div>
    <h2>🧩 Module Status</h2>
    <table>
      <tr><th>Module</th><th>Status</th><th>Calls</th><th>Errors</th></tr>
      <tr><td>U1 Proactive AI</td><td class="status-active">Active</td><td>50K</td><td>12</td></tr>
      <tr><td>U3 Language Hub</td><td class="status-active">Active</td><td>25K</td><td>5</td></tr>
      <tr><td>U10 Payment</td><td class="status-active">Active</td><td>1.2K</td><td>0</td></tr>
      <tr><td>Phase 4 Autonomy</td><td class="status-pending">Building</td><td>0</td><td>0</td></tr>
    </table>
  </div>
</body>
</html>
