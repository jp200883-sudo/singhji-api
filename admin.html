<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ Admin — Singh Ji AI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#0a0a1a;color:#fff;min-height:100vh}
        .back{position:fixed;top:15px;left:15px;background:#333;color:#fff;padding:8px 16px;border-radius:20px;text-decoration:none;font-size:13px}
        .header{text-align:center;padding:40px 20px;border-bottom:1px solid #333}
        .header h1{font-size:28px}
        .container{max-width:800px;margin:30px auto;padding:20px}
        .card{background:#1a1a3e;border:1px solid #2a2a4e;border-radius:12px;padding:20px;margin-bottom:15px}
        .card h3{color:#ff6b35;margin-bottom:15px}
        .row{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #2a2a4e}
        .row:last-child{border:none}
        .online{color:#00ff88}
        .offline{color:#ff4444}
        .btn{background:#ff6b35;color:#fff;border:none;padding:8px 16px;border-radius:5px;cursor:pointer;margin-right:10px}
    </style>
</head>
<body>
    <a href="index.html" class="back">← Back</a>
    <div class="header">
        <h1>⚙️ Admin Panel</h1>
        <p>Dashboard & Controls</p>
    </div>
    <div class="container">
        <div class="card">
            <h3>🔑 API Status</h3>
            <div class="row"><span>Gemini</span><span class="online">✅ Active</span></div>
            <div class="row"><span>HuggingFace</span><span class="online">✅ Active</span></div>
            <div class="row"><span>Plant.id</span><span class="online">✅ Active</span></div>
            <div class="row"><span>Telegram</span><span class="online">✅ Active</span></div>
            <div class="row"><span>Bhashini</span><span class="offline">⏳ Pending</span></div>
        </div>
        <div class="card">
            <h3>🤖 Bot Controls</h3>
            <button class="btn" onclick="alert('Bot Restarted')">🔄 Restart</button>
            <button class="btn" onclick="alert('Webhook Updated')">🔗 Webhook</button>
        </div>
    </div>
</body>
</html>
